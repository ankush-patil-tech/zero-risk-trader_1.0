name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ---------- ACR LOGIN ----------
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: zerorisktradercontaner.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image for ACR
        run: |
          docker build \
            --no-cache \
            -t zerorisktradercontaner.azurecr.io/zerorisktrader-python-app:latest .

      - name: Push Docker Image to ACR
        run: |
          docker push zerorisktradercontaner.azurecr.io/zerorisktrader-python-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "ZeroRiskTrader"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: |
            zerorisktradercontaner.azurecr.io/zerorisktrader-python-app:latest
