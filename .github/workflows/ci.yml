name: Django CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

      # Dummy DB values for CI (safe)
      DB_NAME: test
      DB_USER: test
      DB_PASSWORD: test
      DB_HOST: localhost

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python manage.py test

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Django app image
        run: |
          docker build --no-cache -t ankushp1650/zerorisktrader-python-app:v3 .

      - name: Push Django app image
        run: |
          docker push ankushp1650/zerorisktrader-python-app:v3

      - name: Build Nginx image
        run: |
          docker build --no-cache -t ankushp1650/zerorisktrader-nginx:v3 -f nginx/Dockerfile.nginx .

      - name: Push Nginx image
        run: |
          docker push ankushp1650/zerorisktrader-nginx:v3
