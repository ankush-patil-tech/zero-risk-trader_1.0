<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroRiskTrader – AI ML Summary</title>

<style>
:root {
  --bg: #f4f7fb;
  --card: #ffffff;
  --text: #1f2a44;
  --border: #e5e7eb;
  --blue: #0057c2;
  --green: #16a34a;
  --yellow: #facc15;
  --red: #dc2626;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ================= PAGE ================= */

.page {
  padding: 40px 30px;
}

/* ================= HEADER CARD ================= */

.header-card {
  background: var(--card);
  border-radius: 18px;
  padding: 20px 32px 28px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.08);
  margin-bottom: 50px;
}

/* ================= TOP BUTTON ROW ================= */

.header-top {
  display: flex;
  justify-content: flex-end;
  gap: 14px;
}

/* NAV BUTTONS */
.header-top a {
  background: var(--blue);
  color: #fff;
  text-decoration: none;
  padding: 10px 22px;
  font-weight: 700;
  border-radius: 8px;
  font-size: 15px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.18);
  transition: all 0.25s ease;
}

.header-top a:hover {
  transform: translateY(-2px);
  opacity: 0.95;
}

/* ================= TITLE ================= */

.header-title {
  margin-top: 22px;
  text-align: center;
  font-size: 30px;        /* REDUCED SIZE */
  font-weight: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

/* ================= MAIN CONTENT ================= */

.container {
  max-width: 1000px;
  margin: 0 auto;
}

/* ================= STOCK BUTTONS ================= */

.stock-buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.stock-buttons button {
  padding: 12px 26px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: #ffffff;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.06);
}

.stock-buttons button:hover {
  background: #eef2ff;
  border-color: var(--blue);
}

/* ================= AI CARD ================= */

.card {
  background: var(--card);
  border-radius: 26px;
  padding: 32px;
  box-shadow: 0 25px 60px rgba(0,0,0,.12);
  display: none;
}

.stock-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 12px;
}

/* ================= RISK BADGE ================= */

.risk-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 900;
  margin-bottom: 20px;
}

.risk-high { background: #fee2e2; color: var(--red); }
.risk-medium { background: #fef3c7; color: #92400e; }
.risk-low { background: #dcfce7; color: var(--green); }

/* ================= AI CONTENT ================= */

.ai-box {
  background: #f9fafb;
  border-radius: 16px;
  padding: 22px;
  border: 1px solid var(--border);
  line-height: 1.8;
  font-size: 15px;
}

.loading {
  font-weight: 800;
  color: #6b7280;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 900px) {
  .header-top {
    justify-content: center;
    flex-wrap: wrap;
  }

  .header-title {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <div class="header-card">

    <!-- TOP RIGHT BUTTONS -->
    <div class="header-top">
      <a href="{% url 'dashboard' %}">Home</a>
      <a href="{% url 'platform' %}">Dashboard</a>
      <a href="{% url 'recommendations' %}">Visualizations</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>

    <!-- CENTER TITLE BELOW -->
    <div class="header-title">
      📊 ZeroRiskTrader AIML Summary
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="container">

    <div class="stock-buttons">
      <button onclick="getAiSummary('TCS')">TCS</button>
      <button onclick="getAiSummary('RELIANCE')">RELIANCE</button>
      <button onclick="getAiSummary('HDFCBANK')">HDFCBANK</button>
      <button onclick="getAiSummary('BHARTIARTL')">BHARTIARTL</button>
      <button onclick="getAiSummary('ICICIBANK')">ICICIBANK</button>
    </div>

    <div class="card" id="aiCard">
      <div class="stock-title" id="stockTitle"></div>
      <div id="riskBadge"></div>
      <div id="aiText" class="ai-box"></div>
    </div>

  </div>
</div>

<script>
function extractRisk(text) {
  if (text.includes("**HIGH**")) return "HIGH";
  if (text.includes("**MEDIUM**")) return "MEDIUM";
  if (text.includes("**LOW**")) return "LOW";
  return null;
}

function formatAiText(text) {
  return text
    .replace(/### (.*)/g, "<h3>$1</h3>")
    .replace(/- (.*)/g, "<li>$1</li>")
    .replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>");
}

function getAiSummary(stock) {
  document.getElementById("aiCard").style.display = "block";
  document.getElementById("stockTitle").innerText =
    stock + " – AI Explanation";
  document.getElementById("aiText").innerHTML =
    "<div class='loading'>Analyzing ML models…</div>";
  document.getElementById("riskBadge").innerHTML = "";

  fetch(`/auth/ai/ml-summary/?stock=${stock}`)
    .then(res => res.json())
    .then(data => {
      const risk = extractRisk(data.ai_summary);
      if (risk) {
        document.getElementById("riskBadge").innerHTML =
          `<span class="risk-badge risk-${risk.toLowerCase()}">${risk} RISK</span>`;
      }
      document.getElementById("aiText").innerHTML =
        formatAiText(data.ai_summary);
    })
    .catch(() => {
      document.getElementById("aiText").innerText =
        "Unable to load AI summary.";
    });
}
</script>

</body>
</html>
