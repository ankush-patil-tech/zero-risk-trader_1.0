<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroRiskTrader – AI ML Summary</title>

<style>
:root {
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1f2a44;
  --border:#e5e7eb;
  --blue:#2563eb;
  --green:#16a34a;
  --yellow:#f59e0b;
  --red:#dc2626;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.page{padding:40px}

/* ================= HEADER ================= */
.header-card{
  background:#fff;
  border-radius:22px;
  padding:24px 36px 32px;
  box-shadow:0 25px 60px rgba(0,0,0,.08);
  margin-bottom:50px;
}

.header-top{
  display:flex;
  justify-content:flex-end;
  gap:14px;
}

.header-top a{
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  padding:10px 22px;
  font-weight:700;
  border-radius:10px;
}

.header-title{
  margin-top:24px;
  text-align:center;
  font-size:30px;
  font-weight:900;
}

/* ================= CONTENT ================= */
.container{
  max-width:1050px;
  margin:auto;
}

/* STOCK BUTTONS */
.stock-buttons{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.stock-buttons button{
  padding:12px 28px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.stock-buttons button:hover{
  background:#eef2ff;
}

/* ================= MAIN CARD ================= */
.card{
  background:#fff;
  border-radius:28px;
  padding:36px;
  box-shadow:0 30px 70px rgba(0,0,0,.12);
  display:none;
}

.stock-title{
  font-size:26px;
  font-weight:900;
  margin-bottom:10px;
}

/* RISK BADGE */
.risk-badge{
  display:inline-block;
  padding:6px 18px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  margin-bottom:22px;
}

.risk-low{background:#dcfce7;color:var(--green)}
.risk-medium{background:#fef3c7;color:#92400e}
.risk-high{background:#fee2e2;color:var(--red)}

/* ================= AI GRID ================= */
.ai-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.ai-card{
  background:#f9fafb;
  border-radius:18px;
  padding:20px 22px;
  border:1px solid var(--border);
}

.ai-card h4{
  margin:0 0 8px;
  font-size:15px;
  font-weight:900;
  color:#2563eb;
}

.ai-card p{
  margin:0;
  font-size:14.5px;
  line-height:1.6;
}

.ai-full{
  grid-column:1 / -1;
}

.loading{
  font-weight:800;
  color:#6b7280;
}

/* MOBILE */
@media(max-width:850px){
  .ai-grid{grid-template-columns:1fr}
  .header-title{font-size:24px}
}
</style>
</head>

<body>

<div class="page">

  <div class="header-card">
    <div class="header-top">
      <a href="{% url 'dashboard' %}">Home</a>
      <a href="{% url 'platform' %}">Dashboard</a>
      <a href="{% url 'recommendations' %}">Visualizations</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>
    <div class="header-title">📊 ZeroRiskTrader AI-ML Explanation</div>
  </div>

  <div class="container">

    <div class="stock-buttons">
      <button onclick="getAiSummary('TCS')">TCS</button>
      <button onclick="getAiSummary('RELIANCE')">RELIANCE</button>
      <button onclick="getAiSummary('HDFCBANK')">HDFCBANK</button>
      <button onclick="getAiSummary('BHARTIARTL')">BHARTIARTL</button>
      <button onclick="getAiSummary('ICICIBANK')">ICICIBANK</button>
    </div>

    <div class="card" id="aiCard">
      <div class="stock-title" id="stockTitle"></div>
      <div id="riskBadge"></div>
      <div id="aiContent" class="ai-grid"></div>
    </div>

  </div>
</div>

<script>
function getAiSummary(stock){

  document.getElementById("aiCard").style.display="block";
  document.getElementById("stockTitle").innerText = stock + " – AI Explanation";
  document.getElementById("riskBadge").innerHTML="";
  document.getElementById("aiContent").innerHTML =
    "<div class='loading'>Analyzing ML performance and risk…</div>";

  fetch(`/auth/ai/ml-summary/?stock=${stock}`)
    .then(r=>r.json())
    .then(data=>{

      const text = data.ai_summary || "";

      if(!text){
        document.getElementById("aiContent").innerText =
          "No AI summary available.";
        return;
      }

      // Risk badge
      if(text.includes("HIGH"))
        document.getElementById("riskBadge").innerHTML =
          "<span class='risk-badge risk-high'>HIGH RISK</span>";
      else if(text.includes("MEDIUM"))
        document.getElementById("riskBadge").innerHTML =
          "<span class='risk-badge risk-medium'>MEDIUM RISK</span>";
      else if(text.includes("LOW"))
        document.getElementById("riskBadge").innerHTML =
          "<span class='risk-badge risk-low'>LOW RISK</span>";

      // Split into sections
      const sections = text.split("###").filter(Boolean);

      let html = "";

      sections.forEach(s=>{
        const lines = s.trim().split("\n").filter(Boolean);
        const title = lines[0];
        const content = lines.slice(1).join(" ");

        html += `
          <div class="ai-card ${title.includes("Suggested") ? "ai-full" : ""}">
            <h4>${title}</h4>
            <p>${content}</p>
          </div>
        `;
      });

      document.getElementById("aiContent").innerHTML = html;
    })
    .catch(()=>{
      document.getElementById("aiContent").innerText =
        "Unable to load AI summary.";
    });
}
</script>

</body>
</html>
